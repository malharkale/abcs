<div class="relative w-full h-screen bg-black overflow-hidden">
  <!-- Remote Video (Full Screen) -->
  <video
    #remoteVideo
    autoplay
    playsinline
    class="absolute inset-0 w-full h-screen object-cover"
  ></video>

  <!-- Local Video (PiP) -->
  <div class="absolute bottom-20 right-4 w-24 h-32 md:w-32 md:h-40 rounded-lg overflow-hidden border-2 border-white shadow-2xl bg-black z-30 hover:shadow-2xl transition-all duration-300"
       [ngClass]="{ 'md:bottom-32 md:right-6': !isMobileView }">
    <video
      #localVideo
      autoplay
      playsinline
      muted
      class="w-full h-full object-cover transform scale-x-[-1]"
    ></video>

    <!-- Local Video Label -->
    <div class="absolute bottom-2 left-2 bg-black bg-opacity-60 text-white text-xs px-2 py-1 rounded">
      You
    </div>
  </div>

  <!-- Status Bar -->
  <div class="absolute top-0 left-0 right-0 bg-gradient-to-b from-black via-black to-transparent p-4 z-20">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2">
          <div [ngClass]="['w-3 h-3 rounded-full animate-pulse', getConnectionStatusColor()]"></div>
          <span class="text-white text-sm font-semibold">{{ getConnectionStatusText() }}</span>
        </div>
        <div class="text-gray-300 text-sm">Room: <span class="font-mono font-bold">{{ roomId }}</span></div>
      </div>
      <div class="text-white text-lg font-mono font-bold">{{ callDuration }}</div>
    </div>
  </div>

  <!-- Control Bar -->
  <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black to-transparent p-4 z-20">
    <div class="flex items-center justify-center gap-4 md:gap-6">
      <!-- Mute Audio Button -->
      <button
        (click)="toggleAudio()"
        class="relative group"
        [title]="isAudioEnabled ? 'Mute' : 'Unmute'"
      >
        <div class="w-12 h-12 md:w-14 md:h-14 rounded-full transition-all duration-200"
             [ngClass]="isAudioEnabled ? 'bg-slate-700 hover:bg-slate-600' : 'bg-red-600 hover:bg-red-700'">
          <div class="flex items-center justify-center w-full h-full">
            <svg *ngIf="isAudioEnabled" class="w-6 h-6 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-12a3 3 0 00-3 3v5a3 3 0 006 0V8a3 3 0 00-3-3z"></path>
            </svg>
            <svg *ngIf="!isAudioEnabled" class="w-6 h-6 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.707 6.293a1 1 0 00-1.414 1.414l2.828 2.829a9 9 0 0012.728 0l2.828-2.829a1 1 0 00-1.414-1.414L16.97 8.707a7 7 0 01-9.94 0L5.707 6.293zM19 13a7 7 0 01-12 5.196"></path>
            </svg>
          </div>
        </div>
        <span class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-80 text-white text-xs whitespace-nowrap px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-200">
          {{ isAudioEnabled ? 'Mute' : 'Unmute' }}
        </span>
      </button>

      <!-- Toggle Video Button -->
      <button
        (click)="toggleVideo()"
        class="relative group"
        [title]="isVideoEnabled ? 'Turn off video' : 'Turn on video'"
      >
        <div class="w-12 h-12 md:w-14 md:h-14 rounded-full transition-all duration-200"
             [ngClass]="isVideoEnabled ? 'bg-slate-700 hover:bg-slate-600' : 'bg-red-600 hover:bg-red-700'">
          <div class="flex items-center justify-center w-full h-full">
            <svg *ngIf="isVideoEnabled" class="w-6 h-6 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
            <svg *ngIf="!isVideoEnabled" class="w-6 h-6 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
          </div>
        </div>
        <span class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-80 text-white text-xs whitespace-nowrap px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-200">
          {{ isVideoEnabled ? 'Turn off' : 'Turn on' }}
        </span>
      </button>

      <!-- Switch Camera Button (Mobile) -->
      <button
        *ngIf="isMobileView"
        (click)="switchCamera()"
        class="relative group"
        title="Switch camera"
      >
        <div class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-slate-700 hover:bg-slate-600 transition-all duration-200">
          <div class="flex items-center justify-center w-full h-full">
            <svg class="w-6 h-6 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v12m0 0l-4-4m4 4l4-4M16 17v-5m0 0l4 4m-4-4l-4 4"></path>
            </svg>
          </div>
        </div>
        <span class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-80 text-white text-xs whitespace-nowrap px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-200">
          Switch
        </span>
      </button>

      <!-- Fullscreen Button -->
      <button
        (click)="toggleFullscreen()"
        class="relative group"
        title="Fullscreen"
      >
        <div class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-slate-700 hover:bg-slate-600 transition-all duration-200">
          <div class="flex items-center justify-center w-full h-full">
            <svg *ngIf="!isFullscreen" class="w-6 h-6 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6v4m12-4h4v4M6 18h4v-4m12 4h-4v-4"></path>
            </svg>
            <svg *ngIf="isFullscreen" class="w-6 h-6 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 6h4M6 18h4m8-12h4M14 18h4"></path>
            </svg>
          </div>
        </div>
        <span class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-80 text-white text-xs whitespace-nowrap px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-200">
          {{ isFullscreen ? 'Exit FS' : 'Fullscreen' }}
        </span>
      </button>

      <!-- End Call Button -->
      <button
        (click)="endCall()"
        class="relative group"
        title="End call"
      >
        <div class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-red-600 hover:bg-red-700 transition-all duration-200 transform hover:scale-110">
          <div class="flex items-center justify-center w-full h-full">
            <svg class="w-6 h-6 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M6.5 8a5.5 5.5 0 11-11 0 5.5 5.5 0 0111 0z"></path>
            </svg>
          </div>
        </div>
        <span class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-80 text-white text-xs whitespace-nowrap px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-200">
          End Call
        </span>
      </button>
    </div>
  </div>

  <!-- No Remote Video Indicator -->
  <div *ngIf="connectionStatus !== 'connected'" class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-50 z-10">
    <div class="text-center">
      <div class="animate-spin mb-4">
        <svg class="w-16 h-16 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
      </div>
      <p class="text-white text-lg font-semibold">{{ getConnectionStatusText() }}</p>
      <p class="text-gray-300 text-sm mt-2">Waiting for peer to join...</p>
    </div>
  </div>
</div>
