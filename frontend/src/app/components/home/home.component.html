<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 mb-6 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
        </svg>
      </div>
      <h1 class="text-4xl font-bold text-white mb-2">CallForFree</h1>
      <p class="text-gray-400">Crystal clear video calls</p>
    </div>

    <!-- Gen Room Display -->
    <div *ngIf="showCreateRoom" class="bg-slate-800 rounded-lg p-8 mb-8 border border-slate-700 shadow-2xl">
      <h2 class="text-2xl font-bold text-white mb-4">Your Room ID</h2>
      <div class="bg-slate-900 border-2 border-blue-500 rounded-lg p-6 mb-6 text-center">
        <p class="text-5xl font-bold text-blue-400 font-mono tracking-wider">{{ generatedRoomId }}</p>
      </div>
      <p class="text-gray-300 text-center mb-6 text-sm">Share this ID with the person you want to call</p>
      
      <div class="space-y-3">
        <button (click)="copyRoomId()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
          </svg>
          Copy Room ID
        </button>
        <button (click)="joinGeneratedRoom()" [disabled]="loading" class="w-full bg-green-600 hover:bg-green-700 disabled:bg-gray-600 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
          <span *ngIf="!loading">Start Call</span>
          <span *ngIf="loading" class="flex items-center justify-center gap-2">
            <div class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
            Waiting...
          </span>
        </button>
      </div>
    </div>

    <!-- Main Buttons -->
    <div *ngIf="!showCreateRoom" class="space-y-4 mb-8">
      <button (click)="createRoom()" [disabled]="loading" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 disabled:from-gray-600 disabled:to-gray-700 text-white font-bold py-4 px-6 rounded-lg transition duration-200 transform hover:scale-105 flex items-center justify-center gap-3 shadow-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        <span>Create Room</span>
      </button>

      <!-- Join Room Input -->
      <div class="bg-slate-800 rounded-lg p-6 border border-slate-700">
        <label class="block text-gray-300 text-sm font-semibold mb-3">Or join an existing room</label>
        <input
          [(ngModel)]="roomId"
          (keyup.enter)="joinRoom()"
          type="text"
          placeholder="Enter Room ID (e.g., 8452)"
          maxlength="4"
          class="w-full bg-slate-900 border border-slate-600 text-white px-4 py-3 rounded-lg mb-3 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:ring-opacity-20 text-center text-2xl font-mono tracking-wider"
        />
        <button (click)="joinRoom()" [disabled]="loading || !roomId" class="w-full bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 disabled:from-gray-600 disabled:to-gray-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 transform hover:scale-105 flex items-center justify-center gap-3">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
          <span>Join Room</span>
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="bg-red-900 border border-red-700 text-red-100 px-4 py-3 rounded-lg mb-4 flex items-start gap-3 animate-pulse">
      <svg class="w-6 h-6 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <span>{{ error }}</span>
    </div>

    <!-- Features -->
    <div class="grid grid-cols-3 gap-4 text-center">
      <div class="bg-slate-800 rounded-lg p-4 border border-slate-700">
        <svg class="w-8 h-8 text-blue-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
        </svg>
        <p class="text-xs text-gray-400">HD Video</p>
      </div>
      <div class="bg-slate-800 rounded-lg p-4 border border-slate-700">
        <svg class="w-8 h-8 text-green-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4"></path>
        </svg>
        <p class="text-xs text-gray-400">Crystal Clear</p>
      </div>
      <div class="bg-slate-800 rounded-lg p-4 border border-slate-700">
        <svg class="w-8 h-8 text-purple-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
        <p class="text-xs text-gray-400">Secure</p>
      </div>
    </div>
  </div>
</div>
